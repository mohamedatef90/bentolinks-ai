
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BentoLinks AI - Smart Link Manager</title>
    
    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="alternate icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    
    <!-- Meta tags -->
    <meta name="description" content="AI-powered link manager with intelligent categorization, cloud sync, and beautiful dark UI">
    <meta name="theme-color" content="#c1ff00">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0c0c0e;
            --bg-card: #151518;
            --accent: #c1ff00;
            --text-main: #fafafa;
            --text-dim: #71717a;
            --border: rgba(255, 255, 255, 0.04);
            --radius: 2rem;
            --font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body.theme-default {
            background: radial-gradient(circle at 50% 0%, #1a1a1e 0%, #0c0c0e 100%);
            background-attachment: fixed;
        }

        body.theme-professional {
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --accent: #2563eb;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --radius: 0.75rem;
            --font-family: 'Inter', sans-serif;
        }

        body.theme-funny {
            --bg-main: #ffefd5;
            --bg-card: #ffffff;
            --accent: #ff00ff;
            --text-main: #333;
            --text-dim: #666;
            --border: #000;
            --radius: 4rem;
            --font-family: 'Comic Sans MS', 'cursive';
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-main);
            color: var(--text-main);
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .theme-funny .bento-card {
            border: 4px solid #000;
            box-shadow: 8px 8px 0px #000;
        }

        .theme-funny .link-card {
            transform: rotate(-1deg);
        }

        .theme-funny .link-card:nth-child(even) {
            transform: rotate(1deg);
        }

        .theme-funny .link-card:hover {
            transform: scale(1.1) rotate(0deg) !important;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--text-dim);
            border-radius: 10px;
        }
        .neon-accent {
            color: var(--accent);
        }
        .bg-neon-accent {
            background-color: var(--accent);
        }
        .bento-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        
        /* Hide scrollbars but allow scrolling */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .perspective-1000 {
            perspective: 1000px;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="theme-default">
    <div id="root"></div>
    <!-- Entry point for the application module -->
    <script type="module" src="/index.tsx"></script>
</body>
</html>
